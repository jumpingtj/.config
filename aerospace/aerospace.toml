alt-k = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair BROWSER app.zen-browser.zen'
alt-l = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair HELIUM net.imput.helium'
alt-g = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair MESSAGES com.apple.MobileSMS'
alt-f = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair WHATSAPP net.whatsapp.WhatsApp'
alt-p = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair ONEPASSWORD com.1password.1password'
alt-o = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair CHATGPT com.openai.chat'
alt-v = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair FINDER com.apple.finder'
alt-m = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair MAIL com.apple.mail'
alt-shift-8 = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair TOR com.torproject.torbrowser'
alt-s = 'exec-and-forget /Users/toby/.config/aerospace/goto-app-workspace.sh --repair SETTINGS com.apple.systempreferences'



alt-a = 'mode service'
alt-r = 'mode resize'

