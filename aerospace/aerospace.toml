config-version = 2

start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 20
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
key-mapping.preset = 'qwerty'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
persistent-workspaces = [
'TERM',
'BROWSER',
'HELIUM',
'MESSAGES',
'WHATSAPP',
'ONEPASSWORD',
'CHATGPT',
'FINDER',
'MAIL',
'TOR',
]

# Run Sketchybar together with AeroSpace
# sketchybar has a built-in detection of already running process,
# so it won't be run twice on AeroSpace restart
after-startup-command = [
	'exec-and-forget sketchybar',
]


# Notify Sketchybar about workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout tiles horizontal horizontal'
alt-4 = 'layout accordion'
alt-cmd-m = 'resize smart -50'
alt-cmd-i = 'resize smart +50'
alt-shift-h = 'move-mouse monitor-force-center'

ctrl-h = 'exec-and-forget /Users/toby/.config/aerospace/move-left.sh'
ctrl-j = 'exec-and-forget /Users/toby/.config/aerospace/move-down.sh'
ctrl-k = 'exec-and-forget /Users/toby/.config/aerospace/move-up.sh'
ctrl-l = 'exec-and-forget /Users/toby/.config/aerospace/move-right.sh'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'

