version: 3
final_space: true
blocks:
    - type: prompt
      alignment: left
      newline: true
      segments:
        - type: path
          style: plain
          template: '{{ .Path }}'
          foreground: blue
          background: transparent
          properties:
            cache_duration: none
            style: powerlevel
            max_width: 30
    - type: prompt
      alignment: left
      segments:
        - template: ❯
          background: transparent
          type: text
          style: plain
          foreground: blue
      newline: true
    - type: rprompt
      overflow: hidden
      segments:
        - type: executiontime
          style: plain
          foreground: yellow
          background: transparent
          properties:
            cache_duration: none
            threshold: 500
            style: austin
transient_prompt:
    template: '❯ '
    foreground: blue
    background: transparent
